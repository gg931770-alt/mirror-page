name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependências
        run: npm install --legacy-peer-deps --no-audit --no-fund

      # BUILD CORRETO DO VITE (Lovable)
      - name: Build static frontend
        run: npx vite build

      - name: Verificar pasta dist
        run: ls -la dist

      # cria o .htaccess para SPA funcionar no subdomínio
      - name: Criar .htaccess SPA
        run: |
          cat > dist/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      - name: Deploy via FTP para subdomínio
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: dist/
          server-dir: mie-product/
          dangerous-clean-slate: true
          timeout: 120000
          log-level: verbose
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
