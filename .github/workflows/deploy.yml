name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # instala dependências do projeto
      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      # gera a pasta dist com o site estático
      - name: Build project
        run: npm run build

      # confirma que existe index.html dentro da dist
      - name: Verify build output
        run: ls -la dist

      # cria .htaccess para SPA
      - name: Create SPA .htaccess
        run: |
          cat > dist/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      # envia SOMENTE a pasta dist para o subdomínio
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: dist/
          server-dir: /
          timeout: 120000
          dangerous-clean-slate: true
          log-level: verbose
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
