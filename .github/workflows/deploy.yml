name: Deploy Lovable via FTP na Hostinger

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # 🔹 instala dependências SOMENTE do frontend
      - name: Install frontend dependencies
        run: |
          cd client
          npm install --legacy-peer-deps --no-audit --no-fund

      # 🔹 builda SOMENTE o frontend (gera client/dist)
      - name: Build frontend
        run: |
          cd client
          npm run build

      # 🔹 confirma que o build gerou index.html
      - name: Verify build output
        run: ls -la client/dist

      # 🔹 cria .htaccess dentro da pasta que será enviada
      - name: Create SPA .htaccess
        run: |
          cat > client/dist/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      # 🔹 envia APENAS os arquivos estáticos para o subdomínio
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          protocol: ftp
          port: 21
          local-dir: client/dist/
          server-dir: /
          timeout: 120000
          dangerous-clean-slate: true
          log-level: verbose
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
